name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Package
        run: tar -czf deploy.tar.gz .next/standalone .next/static public

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.tar.gz
          retention-days: 7

      - name: Deploy to server
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -i ~/.ssh/deploy_key"

          # Write remote deploy script to a file
          cat > /tmp/remote_deploy.sh <<'REMOTESCRIPT'
          set -e
          APP_DIR="$HOME/support.globalsoftwareservices.co.za"
          NODE_BIN="/opt/plesk/node/24/bin/node"
          NODE_BIN_DIR="/opt/plesk/node/24/bin"

          rm -rf /tmp/nextjs-deploy
          mkdir -p /tmp/nextjs-deploy
          cd /tmp/nextjs-deploy
          tar -xzf ~/deploy.tar.gz
          rm ~/deploy.tar.gz

          cd "$APP_DIR"
          # Remove old build files but preserve config, logs, node_modules, .env
          rm -rf .next/standalone .next/static .next/server .next/build \
            .next/BUILD_ID .next/build-manifest.json .next/routes-manifest.json \
            .next/prerender-manifest.json .next/required-server-files.json \
            .next/app-path-routes-manifest.json .next/fallback-build-manifest.json \
            .next/images-manifest.json .next/export-marker.json \
            server.js 2>/dev/null || true

          cp -a /tmp/nextjs-deploy/.next/standalone/. "$APP_DIR/"
          mkdir -p "$APP_DIR/.next/static"
          cp -a /tmp/nextjs-deploy/.next/static/. "$APP_DIR/.next/static/"
          mkdir -p "$APP_DIR/public"
          cp -a /tmp/nextjs-deploy/public/. "$APP_DIR/public/" 2>/dev/null || true
          rm -rf /tmp/nextjs-deploy

          # Ensure Prisma client symlink for Turbopack hashed module
          PRISMA_HASH=$(grep -roh '@prisma/client-[a-f0-9]\+' "$APP_DIR/.next/server/chunks/" 2>/dev/null | head -1 | sed 's/@prisma\///')
          if [ -n "$PRISMA_HASH" ]; then
            echo "Creating symlink for $PRISMA_HASH..."
            ln -sfn ../../.prisma/client "$APP_DIR/node_modules/@prisma/$PRISMA_HASH"
          fi

          # Generate Prisma client for Linux platform
          cd "$APP_DIR"
          export PATH="$NODE_BIN_DIR:/usr/bin:/bin:$PATH"
          npx prisma generate 2>/dev/null || true

          # Restart the Node.js process
          echo "Killing old next-server processes..."
          pkill -f "next-server" -u "$(whoami)" 2>/dev/null || true
          sleep 2

          cd "$APP_DIR"
          export PORT=3001
          export HOSTNAME=0.0.0.0
          export NODE_ENV=production
          nohup "$NODE_BIN" server.js >> console.log 2>> stderr.log &
          sleep 3

          # Verify
          if pgrep -f "next-server" -u "$(whoami)" > /dev/null; then
            echo "Deploy complete. Server restarted successfully."
          else
            echo "WARNING: Server may not have started. Check stderr.log"
            tail -5 "$APP_DIR/stderr.log" 2>/dev/null
            exit 1
          fi
          REMOTESCRIPT

          # Retry SCP up to 3 times
          for i in 1 2 3; do
            echo "SCP attempt $i..."
            if scp $SSH_OPTS -P $DEPLOY_PORT deploy.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:~/deploy.tar.gz"; then
              echo "SCP succeeded on attempt $i"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "SCP failed after 3 attempts"
              exit 1
            fi
            echo "SCP failed, retrying in 10s..."
            sleep 10
          done

          # Retry SSH deploy up to 3 times
          for i in 1 2 3; do
            echo "SSH deploy attempt $i..."
            if ssh $SSH_OPTS -p $DEPLOY_PORT "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s < /tmp/remote_deploy.sh; then
              echo "SSH deploy succeeded on attempt $i"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "SSH deploy failed after 3 attempts"
              exit 1
            fi
            echo "SSH failed, retrying in 10s..."
            sleep 10
          done
