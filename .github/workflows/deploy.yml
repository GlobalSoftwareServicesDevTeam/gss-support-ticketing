name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Package
        run: tar -czf deploy.tar.gz .next/standalone .next/static public

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          scp -o StrictHostKeyChecking=no deploy.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:~/deploy.tar.gz"
          ssh -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s <<'ENDSSH'
            cd httpdocs
            tar -xzf ~/deploy.tar.gz
            rm ~/deploy.tar.gz

            # Copy static assets into standalone
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public 2>/dev/null || true

            # Copy environment file
            cp .env .next/standalone/.env 2>/dev/null || true

            # Restart the Node.js process
            # Kill existing server if running
            if [ -f tmp/server.pid ]; then
              PID=$(cat tmp/server.pid)
              if kill -0 "$PID" 2>/dev/null; then
                kill "$PID" 2>/dev/null || true
                sleep 3
                # Force kill if still running
                kill -9 "$PID" 2>/dev/null || true
              fi
            fi
            pkill -f "node .next/standalone/server.js" 2>/dev/null || true
            pkill -f "node server.js" 2>/dev/null || true
            sleep 2

            mkdir -p tmp

            # Source port from .env if available
            PORT=3000
            if [ -f .env ]; then
              ENV_PORT=$(grep -E '^PORT=' .env | cut -d'=' -f2 | tr -d '"' | tr -d "'")
              [ -n "$ENV_PORT" ] && PORT="$ENV_PORT"
            fi

            cd .next/standalone
            HOSTNAME="0.0.0.0" PORT="$PORT" nohup node server.js > ../../tmp/server.log 2>&1 &
            echo $! > ../../tmp/server.pid
            sleep 3

            # Verify the server started
            NEW_PID=$(cat ../../tmp/server.pid)
            if kill -0 "$NEW_PID" 2>/dev/null; then
              echo "Server restarted successfully with PID $NEW_PID on port $PORT"
            else
              echo "ERROR: Server failed to start. Last 20 lines of log:"
              tail -20 ../../tmp/server.log
              exit 1
            fi
          ENDSSH
