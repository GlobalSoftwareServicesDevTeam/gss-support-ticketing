name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Package
        run: tar -czf deploy.tar.gz .next/standalone .next/static public

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"

          scp $SSH_OPTS -P $DEPLOY_PORT deploy.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:~/deploy.tar.gz"
          ssh $SSH_OPTS -p $DEPLOY_PORT "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s <<'ENDSSH'
            set -e
            DOMAIN_DIR="$HOME/domains/support.globalsoftwareservices.co.za"
            APP_DIR="$DOMAIN_DIR/nodejs"

            # Extract build to temp location
            rm -rf /tmp/nextjs-deploy
            mkdir -p /tmp/nextjs-deploy
            cd /tmp/nextjs-deploy
            tar -xzf ~/deploy.tar.gz
            rm ~/deploy.tar.gz

            # Clean old app files (preserve .env, tmp, console.log, stderr.log, node_modules)
            cd "$APP_DIR"
            find . -mindepth 1 -maxdepth 1 \
              ! -name '.env' \
              ! -name 'tmp' \
              ! -name 'console.log' \
              ! -name 'stderr.log' \
              ! -name 'node_modules' \
              -exec rm -rf {} +

            # Copy standalone build contents to app root
            cp -a /tmp/nextjs-deploy/.next/standalone/. "$APP_DIR/"

            # Copy static assets into .next directory
            mkdir -p "$APP_DIR/.next/static"
            cp -a /tmp/nextjs-deploy/.next/static/. "$APP_DIR/.next/static/"

            # Copy public directory
            mkdir -p "$APP_DIR/public"
            cp -a /tmp/nextjs-deploy/public/. "$APP_DIR/public/" 2>/dev/null || true

            # Clean up temp files
            rm -rf /tmp/nextjs-deploy

            # Restart Passenger
            mkdir -p "$APP_DIR/tmp"
            touch "$APP_DIR/tmp/restart.txt"

            echo "Deploy complete. Passenger restart triggered."
          ENDSSH
