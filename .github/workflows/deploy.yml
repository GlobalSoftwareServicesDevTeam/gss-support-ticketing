name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Package
        run: tar -czf deploy.tar.gz .next/standalone .next/static public

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          scp -o StrictHostKeyChecking=no deploy.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:~/deploy.tar.gz"
          ssh -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s <<'ENDSSH'
            cd httpdocs
            tar -xzf ~/deploy.tar.gz
            rm ~/deploy.tar.gz

            # Copy static assets into standalone
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public 2>/dev/null || true

            # Copy environment file
            cp .env .next/standalone/.env 2>/dev/null || true

            # Restart the Node.js process
            # Kill existing server if running
            if [ -f tmp/server.pid ]; then
              kill "$(cat tmp/server.pid)" 2>/dev/null || true
              sleep 2
            fi
            pkill -f "node .next/standalone/server.js" 2>/dev/null || true
            sleep 1

            mkdir -p tmp
            cd .next/standalone
            nohup node server.js > ../../tmp/server.log 2>&1 &
            echo $! > ../../tmp/server.pid
            echo "Server restarted with PID $(cat ../../tmp/server.pid)"
          ENDSSH
